<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Employee Data</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Department</th>
                <th>Position</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <script>
        async function loadEmployees() {
            const response = await fetch("https://employeemanagement02.onrender.com/api/employees");
            const employees = await response.json();
            let rows = "";
            employees.forEach(emp => {
                rows += `
        <tr>
            <td>${emp.name}</td>
            <td>${emp.email}</td>
            <td>${emp.phone}</td>
            <td>${emp.department}</td>
            <td>${emp.position}</td>
            <td><button onclick="deleteEmployee('${emp._id}')" id="deleteBtn">Delete</button></td>
        </tr>`;
            });
            document.getElementById("tableBody").innerHTML = rows;
        }
        loadEmployees();
        async function deleteEmployee(id) {
            if (confirm("Are you sure you want to delete this employee?")) {
                try {
                    const response = await fetch(`https://employeemanagement02.onrender.com/api/employees/${id}`, {
                        method: "DELETE"
                    });
                    return await response.json();
                } catch (err) {
                    console.log(err);
                    throw err;
                }
            }
        }
    </script>
</body>

</html>
